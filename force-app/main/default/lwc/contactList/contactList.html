<template>
  <lightning-card title="Contact Details" icon-name="custom:custom15">
    <lightning-button variant="success" label="Refresh" onclick={handleRefresh}></lightning-button>




    <lightning-button label="New Contact" onclick={openModal}></lightning-button>

    <template if:true={showModal}>
      <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

          <header class="slds-modal__header">
            <h2 class="slds-text-heading_medium">New Contact</h2>
          </header>

          <div class="slds-modal__content slds-p-around_medium">

            <lightning-input label="First Name" type=text required onchange={handleFirstNameChange}></lightning-input>
            <lightning-input label="Last Name" type=text required onchange={handleLastNameChange}></lightning-input>
            <lightning-input label="Email" type=text required onchange={handleEmailChange}></lightning-input>
            <lightning-input label="Phone" type=text required onchange={handlePhoneChange}></lightning-input>
          </div>

          <footer class="slds-modal__footer">
            <lightning-button onclick={handleButtonClick} label="Save"></lightning-button>
            <lightning-button label="Close" onclick={closeModal}></lightning-button>
          </footer>

        </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template lwc:if={contacts}>
      
      <table border="1" cellspacing="8px" cellpadding="6px">
        <tr>
          <th>Contact Name</th>
          <th>Account Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Created Date</th>
        </tr>
        <template for:each={contacts} for:item="con">
          <tr key={con.Id}>
            <td>{con.Name}</td>
            <td><template lwc:if={con.Account}> {con.Account.Name} </template></td>
            <td>{con.Email}</td>
            <td>{con.Phone}</td>
            <td>{con.CreatedDate}</td>
          </tr>
        </template>
      </table>

    </template>

  </lightning-card>
</template>
